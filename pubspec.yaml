name: budget_tracker
description: Nexus — personal budget tracker, local-first with optional AI insights.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.6

  # Local storage — everything lives on-device
  sqflite: ^2.3.3+1
  path: ^1.9.0
  path_provider: ^2.1.3

  # State management (simple, no boilerplate)
  provider: ^6.1.2

  # Calendar widget
  table_calendar: ^3.1.2

  # Charts
  fl_chart: ^0.68.0

  # Date formatting & utils
  intl: ^0.19.0

  # Fonts
  google_fonts: ^6.2.1

  # Unique IDs for transactions/tags
  uuid: ^4.4.0

  # AI backend client
  http: ^1.2.0

  # Local notifications
  flutter_local_notifications: ^17.2.0
  timezone: ^0.9.4

  # Home screen widget
  home_widget: ^0.6.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: true
  image_path: logo.png
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: logo.png

flutter:
  uses-material-design: true

  assets:
    - assets/logo.png
